<!DOCTYPE html>
<html>
<head>
    <h1>Babbling Brook</h1>
</head>
<body>

<button id="play_brook">Activate Babbling Brook</button>
<button id="play_dial">Activate Dial Tone</button>
<button id="stop_brook">Stop Audio</button>

<script>
let audioCtx;

// babbling brook logic
document.getElementById("play_brook").onclick = () => {

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function createBrownNoise() {
        var bufferSize = 10 * audioCtx.sampleRate,
        noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate),
        output = noiseBuffer.getChannelData(0);

        var lastOut = 0;
        for (var i = 0; i < bufferSize; i++) {
            var brown = Math.random() * 2 - 1;
    
            output[i] = (lastOut + (0.02 * brown)) / 1.02;
            lastOut = output[i];
            output[i] *= 3.5;
        }

        brownNoise = audioCtx.createBufferSource();
        brownNoise.buffer = noiseBuffer;
        brownNoise.loop = true;
        brownNoise.start(0);
        return brownNoise;
    };

    noise1 = createBrownNoise();
    const lpf1 = audioCtx.createBiquadFilter();
    lpf1.type = "lowpass";
    lpf1.frequency.value = 400;

    noise1.connect(lpf1);

    const noise2 = createBrownNoise();

    const lpf2 = audioCtx.createBiquadFilter();
    lpf2.type = "lowpass";
    lpf2.frequency.value = 14;

    const scale = audioCtx.createGain();
    scale.gain.value = 400;

    const offset = audioCtx.createConstantSource();
    offset.offset.value = 500;

    noise2.connect(lpf2);
    lpf2.connect(scale);

    scale.connect(offset.offset);
    offset.start();

    const rhpf = audioCtx.createBiquadFilter();
    rhpf.type = "highpass";
    rhpf.Q.value = 33;

    lpf1.connect(rhpf);

    scale.connect(rhpf.frequency);
    offset.connect(rhpf.frequency);

    const gain = audioCtx.createGain();
    gain.gain.value = 0.1;

    rhpf.connect(gain);
    gain.connect(audioCtx.destination);
};


// dial tone
document.getElementById("play_dial").onclick = () => {

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const dialGain = audioCtx.createGain();
    dialGain.gain.value = 0.1;

    const osc1 = audioCtx.createOscillator();
    osc1.type = "sine";
    osc1.frequency.value = 350;

    const osc2 = audioCtx.createOscillator();
    osc2.type = "sine";
    osc2.frequency.value = 440;

 

    const bandpass = audioCtx.createBiquadFilter();
    bandpass.type = "bandpass";
    bandpass.frequency.value = 2000;

    const highpass = audioCtx.createBiquadFilter();
    highpass.type = "highpass";
    highpass.frequency.value = 400;

    // connect
    osc1.connect(dialGain);
    osc2.connect(dialGain);

    dialGain.connect(bandpass);
    bandpass.connect(highpass);
    highpass.connect(audioCtx.destination);

    osc1.start();
    osc2.start();
};


document.getElementById("stop_brook").onclick = () => {
    if (audioCtx) {
        audioCtx.close();
    }
};
</script>

</body>
</html>
